<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo kịch bản và Prompt Veo 3.1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body,
    .font-sans {
      font-family: 'Public Sans', sans-serif;
    }

    /* Modern Dark Mode Background - Pure Black to eliminate all banding */
    .dark body {
      background-color: #000000;
      background-image: none;
    }

    /* Custom Scrollbar Styling */
    /* For Webkit-based browsers (Chrome, Safari, Edge) */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background-color: transparent;
    }

    .dark ::-webkit-scrollbar-track {
      background-color: #000000;
      /* Match body to hide track artifacts */
    }

    ::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      /* slate-300 */
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background-color: #334155;
      /* slate-700 */
      border: 2px solid #000000;
      /* Match body bg for cleaner look */
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #94a3b8;
      /* slate-400 */
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background-color: #475569;
      /* slate-600 */
    }

    /* For Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }

    .dark * {
      scrollbar-color: #334155 #000000;
    }

    /* Hide scrollbar for specific elements */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>
  <script src="./cloud-ai-renderer.js"></script>
  <script type="module" crossorigin src="./assets/index-ByQoZoaH.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-yqrEw6Gx.css">
</head>

<body class="bg-slate-50 dark:bg-black transition-colors duration-200">
  <div id="root">
    <!-- Native splash: renders instantly before React loads -->
    <div id="native-splash"
      style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1628 0%,#050d1a 40%,#000 100%)">
      <style>
        @keyframes ns-fill {
          0% {
            stroke-dashoffset: 880;
            transform: rotate(-90deg)
          }

          50% {
            stroke-dashoffset: 220;
            transform: rotate(90deg)
          }

          100% {
            stroke-dashoffset: 0;
            transform: rotate(270deg)
          }
        }

        @keyframes ns-fade {
          0% {
            opacity: 0;
            transform: scale(.85)
          }

          100% {
            opacity: 1;
            transform: scale(1)
          }
        }

        @keyframes ns-dots {

          0%,
          80%,
          100% {
            opacity: .3
          }

          40% {
            opacity: 1
          }
        }

        .ns-ring {
          transform-origin: 150px 150px;
          animation: ns-fill 5s ease-in-out infinite
        }
      </style>
      <div style="position:relative;animation:ns-fade .6s ease-out forwards">
        <div style="width:300px;height:300px;position:relative">
          <svg width="300" height="300" viewBox="0 0 300 300">
            <circle cx="150" cy="150" r="140" fill="none" stroke="rgba(74,222,128,.06)" stroke-width="2.5" />
            <circle class="ns-ring" cx="150" cy="150" r="140" fill="none" stroke="#4ade80" stroke-width="3"
              stroke-linecap="round" stroke-dasharray="880" stroke-dashoffset="880" />
          </svg>
        </div>
        <div
          style="position:absolute;top:25px;left:25px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#0f1d32,#080f1e 50%,#050a14);border:1px solid rgba(74,222,128,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:inset 0 0 60px rgba(0,0,0,.8)">
          <div
            style="font-size:12px;font-weight:700;letter-spacing:3px;color:#e2e8f0;text-transform:uppercase;font-family:'Public Sans',sans-serif">
            VEO AUTOMATION PRO</div>
          <div
            style="font-size:9px;letter-spacing:3px;color:#4ade80;text-transform:uppercase;font-family:'Public Sans',sans-serif">
            THIEN HANH MEDIA</div>
          <div style="font-size:11px;color:#4ade80;font-family:monospace;margin-top:2px">v1.5.3</div>
        </div>
        <div
          style="position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:#64748b;font-family:'Public Sans',sans-serif;letter-spacing:2px">Đang khởi
            động</span>
          <span
            style="width:4px;height:4px;border-radius:50%;background:#4ade80;animation:ns-dots 1.4s ease-in-out infinite"></span>
          <span
            style="width:4px;height:4px;border-radius:50%;background:#4ade80;animation:ns-dots 1.4s ease-in-out infinite .2s"></span>
          <span
            style="width:4px;height:4px;border-radius:50%;background:#4ade80;animation:ns-dots 1.4s ease-in-out infinite .4s"></span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
